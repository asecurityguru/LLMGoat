name: SCA Security Scan
 
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
 
permissions:
  contents: read
  security-events: write
  pull-requests: write
 
jobs:
  pip-audit:
    name: pip-audit (Python dependency scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install pip-audit
        run: pip install pip-audit
 
      - name: Install project dependencies
        run: pip install .
 
      - name: Run pip-audit
        run: |
          pip-audit \
            -f sarif \
            -o pip-audit-results.sarif
        continue-on-error: true
 
      - name: Upload pip-audit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit-results.sarif
          category: pip-audit
 
  trivy:
    name: Trivy (filesystem + container scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
 
      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
 
      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f "Dockerfile" ] || [ -f "app/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [ -f "Dockerfile" ]; then
              echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
              echo "context=." >> "$GITHUB_OUTPUT"
            else
              echo "path=app/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "context=app" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
 
      - name: Build image for scanning
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          docker build \
            -f "${{ steps.dockerfile.outputs.path }}" \
            -t llmgoat:scan \
            "${{ steps.dockerfile.outputs.context }}"
        continue-on-error: true
 
      - name: Run Trivy image scan
        if: steps.dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: llmgoat:scan
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true
 
      - name: Upload Trivy image SARIF
        if: steps.dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image
 
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
        continue-on-error: true
 
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
 
  sca-summary:
    name: SCA Summary
    runs-on: ubuntu-latest
    needs: [pip-audit, trivy]
    if: always()
    steps:
      - name: Report SCA status
        run: |
          echo "## SCA Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit: ${{ needs.pip-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: ${{ needs.trivy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Findings are available under the repo's Security > Code scanning tab." >> $GITHUB_STEP_SUMMARY
          echo "SBOM artifact (CycloneDX) is attached to this workflow run." >> $GITHUB_STEP_SUMMARY
